version: 2.1

commands:
  update_docker:
    steps:
      - run:
          name: Update docker
          command: |
            sudo apt-get update
            sudo apt-get --only-upgrade install docker-ce docker-ce-cli containerd.io

jobs:
  compile-amd64:
    parameters:
      base-image:
        type: string
        default: "cimg/base:current"
      otp-version:
        type: string
        default: "27.1.2"
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - update_docker
      - compile:
          base-image: <<parameters.base-image>>
          otp-version: <<parameters.otp-version>>
  compile:
    parameters:
      resource-class:
        type: string
        default: "medium"
      base-image:
        type: string
        default: "cimg/base:current"
      otp-version:
        type: string
        default: "27.1.2"
    machine:
      image: ubuntu-2204:current
    resource_class: <<parameters.resource-class>>
    steps:
      - update_docker
      - checkout
      - run:
          name: Compile Erlang/OTP
          command: |
            BASE_IMAGE=<<parameters.base-image>> \
            OTP_VERSION=<<parameters.otp-version>> ./compile.sh
      - persist_to_workspace:
          root: ~/project/
          paths: ["builds"]
  build:
    parameters:
      base-image:
        type: string
        default: "cimg/base:current"
      otp-version:
        type: string
        default: "27.1.2"
    machine:
      image: ubuntu-2204:current
    resource_class: medium
    steps:
      - update_docker
      - checkout
      - attach_workspace:
          at: "~/project"
      - run:
          name: Setup buildx
          command: |
            docker run --privileged --rm tonistiigi/binfmt --install all
            docker buildx create --name builder --driver docker-container --bootstrap --use
      - run:
          name: Docker login
          command: docker login -u ${DOCKERHUB_USER} -p ${DOCKERHUB_PASS}
      - run:
          name: Build multi-platform docker image
          command: |
            BASE_IMAGE=<<parameters.base-image>> \
            OTP_VERSION=<<parameters.otp-version>> ./circleci-build.sh

workflows:
  cimg:
    jobs:
      - compile:
          name: compile-amd64
      - compile:
          name: compile-arm64
          resource-class: "arm.medium"
      - build:
          context: mongooseim-org
          requires:
            - compile-amd64
            - compile-arm64
  ubuntu-jammy:
    jobs:
      - compile:
          name: compile-amd64
          base-image: "ubuntu:jammy"
      - compile:
          name: compile-arm64
          base-image: "ubuntu:jammy"
          resource-class: "arm.medium"
      - build:
          base-image: "ubuntu:jammy"
          context: mongooseim-org
          requires:
            - compile-amd64
            - compile-arm64
